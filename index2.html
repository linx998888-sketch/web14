<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Header 導覽列範例</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Microsoft JhengHei", Arial, sans-serif;
      background-color: #f5f5f5;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 60px;
      background-color: #111827;
      color: white;
    }

    .logo {
      font-size: 28px;
      font-weight: bold;
      letter-spacing: 1px;
    }

    nav {
      display: flex;
      gap: 24px;
      align-items: center;
    }

    nav a {
      color: white;
      text-decoration: none;
      font-size: 16px;
      font-weight: 500;
      transition: color 0.3s;
    }

    nav a:hover {
      color: #38bdf8;
    }
  </style>
</head>

<body>

  <header>
    <div class="logo">SPORT COACH</div>

    <nav>
      <a href="#">首頁</a>
      <a href="#">關於講師</a>
      <a href="#">課程技能</a>
      <a href="#">學員成果</a>
      <a href="#">聯絡我們</a>
    </nav>
  </header>

</body>
</html>
